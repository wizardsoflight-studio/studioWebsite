<!DOCTYPE html>
<!--
  This file exists ONLY so Netlify's build bot can detect the form fields
  during the @netlify/plugin-nextjs@5 build process.

  The actual user-facing form is in src/app/contact/page.tsx.
  Netlify Forms requires a static HTML declaration when using Next.js App Router.
  See: https://ntl.fyi/next-runtime-forms-migration
-->
<html lang="en">
<head><meta charset="UTF-8" /></head>
<body>
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="name"    type="text" />
    <input name="email"   type="email" />
    <select name="subject">
      <option value="custom-order">Custom Order Inquiry</option>
      <option value="order-question">Existing Order Question</option>
      <option value="collaboration">Collaboration / Events</option>
      <option value="wholesale">Wholesale Inquiry</option>
      <option value="general">General Question</option>
    </select>
    <textarea name="message"></textarea>
  </form>
</body>
</html>
